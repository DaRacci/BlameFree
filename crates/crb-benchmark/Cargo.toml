[package]
name = "crb-benchmark"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "crb-benchmark"
path = "src/main.rs"

[lib]
name = "crb_benchmark"
path = "src/lib.rs"

[features]
reduce-diff = ["crb-harness/reduce-diff"]

[dependencies]
crb-harness = { path = "../crb-harness" }
crb-reporting = { path = "../crb-reporting" }
crb-judge = { path = "../crb-judge" }
crb-tools = { path = "../crb-tools" }
crb-rules = { path = "../crb-rules" }
crb-dashboard = { path = "../crb-dashboard" }
crb-agents = { path = "../crb-agents" }
clap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
regex = { workspace = true }
rig-core = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync"] }
dotenvy = { workspace = true }

[dev-dependencies]
tempfile = "3"
