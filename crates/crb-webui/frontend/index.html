<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review Harness Dashboard</title>
  <link data-trunk rel="rust" data-cdylib="crb-webui-frontend" />
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }
    * { box-sizing: border-box; }
    .navbar { background: #1e293b; padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1.5rem; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100; }
    .navbar a { color: #94a3b8; text-decoration: none; font-weight: 500; transition: color 0.2s; }
    .navbar a:hover { color: #38bdf8; }
    .navbar a.active { color: #38bdf8; }
    .navbar .brand { color: #e2e8f0; font-weight: 700; font-size: 1.1rem; }
    .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .card h3 { margin-top: 0; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 6px; border: none; cursor: pointer; font-weight: 500; text-decoration: none; transition: all 0.2s; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #475569; cursor: not-allowed; }
    .btn-green { background: #16a34a; color: #fff; }
    .btn-green:hover { background: #15803d; }
    .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.8rem; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    .badge-done { background: #14532d; color: #4ade80; }
    .badge-failed { background: #7f1d1d; color: #fca5a5; }
    .badge-running { background: #713f12; color: #facc15; }
    .badge-pending { background: #1e293b; color: #64748b; }
    .metric-card { display: inline-flex; flex-direction: column; align-items: center; padding: 1.5rem; background: #1e293b; border: 1px solid #334155; border-radius: 8px; min-width: 150px; }
    .metric-card .value { font-size: 2rem; font-weight: 700; }
    .metric-card .label { font-size: 0.8rem; color: #64748b; text-transform: uppercase; margin-top: 0.25rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid #334155; }
    th { color: #64748b; font-weight: 600; cursor: pointer; user-select: none; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
    th:hover { color: #94a3b8; }
    tr:hover { background: #1e293b; }
    tr:last-child td { border-bottom: none; }
    .agent-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 768px) { .agent-grid { grid-template-columns: 1fr; } }
    .agent-pane { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 1rem; min-height: 200px; max-height: 350px; overflow-y: auto; display: flex; flex-direction: column; }
    .agent-pane .header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; font-weight: 600; font-size: 0.95rem; padding-bottom: 0.5rem; border-bottom: 1px solid #334155; }
    .agent-pane .status-pending { color: #64748b; }
    .agent-pane .status-reviewing { color: #eab308; }
    .agent-pane .status-done { color: #22c55e; }
    .agent-pane .status-failed { color: #ef4444; }
    .agent-pane .response-line { font-family: "Fira Code", "Cascadia Code", monospace; font-size: 0.8rem; color: #94a3b8; white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
    .agent-pane::-webkit-scrollbar { width: 4px; }
    .agent-pane::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
    .progress-bar { height: 24px; background: #334155; border-radius: 12px; overflow: hidden; margin: 0.5rem 0; }
    .progress-bar .fill { height: 100%; background: linear-gradient(90deg, #2563eb, #38bdf8); transition: width 0.3s; border-radius: 12px; }
    .progress-bar .label { position: absolute; left: 50%; transform: translateX(-50%); font-size: 0.75rem; font-weight: 600; color: #fff; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.25rem; color: #94a3b8; font-size: 0.85rem; font-weight: 500; }
    .form-group input, .form-group select { width: 100%; padding: 0.5rem 0.75rem; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 0.9rem; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2); }
    .form-group input[type="range"] { padding: 0; }
    .checkbox-group { display: flex; gap: 1rem; flex-wrap: wrap; }
    .checkbox-group label { display: flex; align-items: center; gap: 0.35rem; cursor: pointer; padding: 0.35rem 0.75rem; background: #0f172a; border: 1px solid #334155; border-radius: 4px; transition: all 0.2s; }
    .checkbox-group label:hover { border-color: #2563eb; }
    .checkbox-group input[type="checkbox"] { accent-color: #2563eb; }
    .live-nav { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1.5rem; background: #1e293b; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100; }
    .live-nav .dot { width: 10px; height: 10px; border-radius: 50%; background: #ef4444; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .sparkline { display: flex; align-items: flex-end; gap: 2px; height: 40px; }
    .sparkline .bar { width: 6px; background: #2563eb; border-radius: 2px 2px 0 0; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #334155; border-top-color: #38bdf8; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state { display: flex; align-items: center; gap: 0.75rem; color: #64748b; padding: 2rem; justify-content: center; }
    .empty-state { text-align: center; padding: 3rem; }
    .empty-state h2 { margin-top: 0; }
    .code { font-family: "Fira Code", "Cascadia Code", monospace; font-size: 0.85rem; background: #0f172a; padding: 0.15rem 0.4rem; border-radius: 3px; color: #94a3b8; }
    a { color: #38bdf8; }
    a:hover { color: #7dd3fc; }
    h1 { font-size: 1.5rem; font-weight: 700; }
    h2 { font-size: 1.25rem; font-weight: 600; }
    h3 { font-size: 1.1rem; font-weight: 600; color: #e2e8f0; }
  </style>
</head>
<body>
  <div id="app"></div>
</body>
</html>
