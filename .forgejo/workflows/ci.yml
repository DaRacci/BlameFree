name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: codeberg-medium
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: https://github.com/dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu,wasm32-unknown-unknown

      - name: Install binstall
        uses: https://github.com/cargo-bins/cargo-binstall@main

      - name: Install Trunk
        uses: &retry https://github.com/nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 30
          retry_wait_seconds: 15
          command: cargo binstall trunk --no-confirm

      - name: Install nextest
        uses: *retry
        with:
          max_attempts: 3
          timeout_minutes: 30
          retry_wait_seconds: 15
          command: cargo binstall cargo-nextest --locked --no-confirm

      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --workspace

      - name: cargo test
        run: cargo nextest
